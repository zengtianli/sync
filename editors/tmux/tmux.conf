# tmux.conf — QWERTY vim-style (based on theniceboy/.config)
# Prefix: M-s (Opt+s) | Directions: h/j/k/l | Deploy: symlink to ~/.tmux.conf

# ─── General ─────────────────────────────────────────────────────
setw -g xterm-keys on
set -s escape-time 0                    # 无延迟，对 vim 友好
set -sg repeat-time 300
set -s focus-events on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g mouse on
set -sg exit-empty on
set -g detach-on-destroy off
set -g allow-passthrough on

set -q -g status-utf8 on
setw -q -g utf8 on

set -g visual-activity off
setw -g monitor-activity off
setw -g monitor-bell off

set -g history-limit 10000

# True color
set -g default-terminal "tmux-256color"
set -as terminal-features ",*256col*:RGB"
set -as terminal-overrides ",*256col*:Tc"

# Reload config
bind r source-file ~/.tmux.conf \; display '~/.tmux.conf sourced'

# ─── Prefix ──────────────────────────────────────────────────────
unbind C-b
set -g prefix M-s

# ─── Display ─────────────────────────────────────────────────────
set -g base-index 1                     # 窗口从 1 开始编号
setw -g pane-base-index 1              # pane 从 1 开始编号
setw -g automatic-rename on
set -g renumber-windows on
set -g set-titles on
set -g display-panes-time 2000
set -g display-time 2000

# ─── Session ─────────────────────────────────────────────────────
bind C-c new-session

# ─── Window Management ──────────────────────────────────────────
unbind -n M-Q                                         # 清除旧绑定残留
unbind -n M-q                                         # 清除旧绑定残留
unbind -n M-x                                         # 清除旧绑定残留
bind -n M-o new-window -c "#{pane_current_path}"     # Alt+o 新窗口
bind -n M-w kill-pane                                 # Alt+w 关 pane
bind -n M-O break-pane                                # Alt+Shift+O pane 独立成窗口

# Window navigation: Alt+数字
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Join pane to window: Alt+Shift+数字
bind -n M-! join-pane -t :1
bind -n M-@ join-pane -t :2
bind -n 'M-#' join-pane -t :3
bind -n 'M-$' join-pane -t :4
bind -n M-% join-pane -t :5
bind -n M-^ join-pane -t :6
bind -n M-& join-pane -t :7
bind -n M-* join-pane -t :8
bind -n M-( join-pane -t :9

# Window swap: Alt+,/. (避免与 M-l pane导航冲突)
bind -n M-, swap-window -d -t :-1       # Alt+, 窗口左移
bind -n M-. swap-window -d -t :+1       # Alt+. 窗口右移

# Rename
unbind ,
bind , command-prompt -p "Rename window:" "rename-window '%%'"
bind . command-prompt -p "Rename session:" "rename-session '%%'"

# ─── Pane: Split (prefix + h/j/k/l) ────────────────────────────
bind h split-window -hb -c "#{pane_current_path}"    # prefix+h 左分屏
bind j split-window -v  -c "#{pane_current_path}"    # prefix+j 下分屏
bind k split-window -vb -c "#{pane_current_path}"    # prefix+k 上分屏
bind l split-window -h  -c "#{pane_current_path}"    # prefix+l 右分屏

# ─── Pane: Navigate (Alt + h/j/k/l) ─────────────────────────────
bind -n M-h select-pane -L              # Alt+h 左
bind -n M-j select-pane -D              # Alt+j 下
bind -n M-k select-pane -U              # Alt+k 上
bind -n M-l select-pane -R              # Alt+l 右

# ─── Pane: Resize (Alt+Shift + H/J/K/L) ─────────────────────────
bind -n M-H resize-pane -L 3            # Alt+H 向左扩展
bind -n M-J resize-pane -D 3            # Alt+J 向下扩展
bind -n M-K resize-pane -U 3            # Alt+K 向上扩展
bind -n M-L resize-pane -R 3            # Alt+L 向右扩展

# ─── Pane: Swap & Zoom ──────────────────────────────────────────
bind > swap-pane -D
bind < swap-pane -U
bind | swap-pane
bind -n M-f resize-pane -Z              # Alt+f 全屏切换
bind Space run-shell "tmux next-layout"

# ─── Pane: Layout Builder (prefix + Shift) ──────────────────────
bind H run-shell "~/.config/tmux/scripts/layout_builder.sh left 2>/dev/null || tmux select-layout main-horizontal"
bind J run-shell "~/.config/tmux/scripts/layout_builder.sh down 2>/dev/null || tmux select-layout even-vertical"
bind K run-shell "~/.config/tmux/scripts/layout_builder.sh up 2>/dev/null || tmux select-layout even-horizontal"
bind L run-shell "~/.config/tmux/scripts/layout_builder.sh right 2>/dev/null || tmux select-layout main-vertical"

# ─── Pane: Move to Window ───────────────────────────────────────
bind 1 if-shell "tmux list-windows | grep -q '^1:'" "join-pane -t :1" ""
bind 2 if-shell "tmux list-windows | grep -q '^2:'" "join-pane -t :2" ""
bind 3 if-shell "tmux list-windows | grep -q '^3:'" "join-pane -t :3" ""
bind 4 if-shell "tmux list-windows | grep -q '^4:'" "join-pane -t :4" ""
bind 5 if-shell "tmux list-windows | grep -q '^5:'" "join-pane -t :5" ""

# ─── Choose Tree ─────────────────────────────────────────────────
bind W choose-tree -Z
bind S choose-tree 'move-pane -v -s "%%"'
bind V choose-tree 'move-pane -h -s "%%"'

# ─── Copy Mode (vim-style) ──────────────────────────────────────
set -g status-keys emacs
set -g mode-keys vi

bind -n M-v copy-mode                   # Alt+v 进入 copy mode

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Movement: standard vim
bind -T copy-mode-vi h send-keys -X cursor-left
bind -T copy-mode-vi l send-keys -X cursor-right
bind -T copy-mode-vi k send-keys -X cursor-up
bind -T copy-mode-vi j send-keys -X cursor-down

# Fast movement
bind -T copy-mode-vi K send-keys -N 5 -X cursor-up
bind -T copy-mode-vi J send-keys -N 5 -X cursor-down

# Word movement (standard vim)
bind -T copy-mode-vi w send-keys -X next-word
bind -T copy-mode-vi e send-keys -X next-word-end
bind -T copy-mode-vi b send-keys -X previous-word

# Line movement (standard vim)
bind -T copy-mode-vi 0 send-keys -X start-of-line
# $ is already bound by default

# Yank
bind -T copy-mode-vi Y send-keys -X copy-end-of-line
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Scroll
unbind -T copy-mode-vi C-u
unbind -T copy-mode-vi C-d
bind -T copy-mode-vi C-u send-keys -N 5 -X scroll-up
bind -T copy-mode-vi C-d send-keys -N 5 -X scroll-down

# Search
bind -T copy-mode-vi / command-prompt -p "Search down:" "send-keys -X search-forward '%%'"
bind -T copy-mode-vi ? command-prompt -p "Search up:" "send-keys -X search-backward '%%'"
bind -T copy-mode-vi n send-keys -X search-again
bind -T copy-mode-vi N send-keys -X search-reverse

# Paste
bind b list-buffers
bind p paste-buffer

# System clipboard paste
bind -n M-V run -b "pbpaste | tmux load-buffer - && tmux paste-buffer"

# ─── Theme ───────────────────────────────────────────────────────

# Pane borders
set -g pane-active-border-style fg=blue
set -g pane-border-style fg=colour244
setw -g pane-border-status top
setw -g pane-border-format ' #{?pane_active,#[fg=blue]●,#[fg=colour244]○} #T '

# Status bar
set -g status-position bottom
set -g status-justify left
set -g status-style bg=colour235,fg=colour248
set -g status-left-length 40
set -g status-right-length 60

set -g status-left '#[fg=colour16,bg=blue,bold] ❐ #S #[fg=blue,bg=colour235] '
set -g status-right '#[fg=colour244] %Y-%m-%d #[fg=colour248,bold]%H:%M '

setw -g window-status-format '#[fg=colour244] #I:#W '
setw -g window-status-current-format '#[fg=blue,bold] #I:#W '
setw -g window-status-separator ''

# ─── Sync Input Toggle ──────────────────────────────────────────
bind C-g if-shell '[[ $(tmux showw synchronize-panes | cut -d\  -f2) == "on" ]]' \
'setw synchronize-panes off; set -g pane-border-style fg=colour244' \
'setw synchronize-panes on; set -g pane-border-style fg=red'

# ─── Plugins (TPM) ──────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect: save pane contents
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save 's'

# Continuum: auto-save every 5 min
set -g @continuum-save-interval '5'

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
