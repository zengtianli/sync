#!/bin/bash

# Yabai 指示器配置
# 此文件定义了与 Yabai Indicator 相关的信号处理

# 指示器套接字路径
INDICATOR_SOCKET="/tmp/yabai-indicator.socket"

# 定义需要监听的事件和对应的动作
INDICATOR_EVENTS=(
    # 任务控制事件
    ["mission_control_exit"]="refresh"
    
    # 显示器事件
    ["display_added"]="refresh"
    ["display_removed"]="refresh"
    
    # 窗口事件
    ["window_created"]="refresh windows"
    ["window_destroyed"]="refresh windows"
    ["window_focused"]="refresh windows"
    ["window_moved"]="refresh windows"
    ["window_resized"]="refresh windows"
    ["window_minimized"]="refresh windows"
    ["window_deminimized"]="refresh windows"
)

# 应用指示器信号
apply_indicator_signals() {
    echo "正在配置 Yabai Indicator 信号..."
    
    # 遍历所有事件并添加信号处理
    for event in "${!INDICATOR_EVENTS[@]}"; do
        action="${INDICATOR_EVENTS[$event]}"
        yabai -m signal --add \
            event="$event" \
            action="echo \"$action\" | nc -U $INDICATOR_SOCKET"
        echo "已添加信号: $event -> $action"
    done
    
    echo "Yabai Indicator 信号配置完成"
}

# 清除指示器信号
clear_indicator_signals() {
    echo "正在清除 Yabai Indicator 信号..."
    
    # 遍历所有事件并移除信号处理
    for event in "${!INDICATOR_EVENTS[@]}"; do
        yabai -m signal --remove "$event"
        echo "已移除信号: $event"
    done
    
    echo "Yabai Indicator 信号已清除"
}

# 重新加载指示器信号
reload_indicator_signals() {
    clear_indicator_signals
    apply_indicator_signals
}
