#!/bin/bash

# 应用程序规则配置
# yabai 默认管理所有应用，此文件用于添加特定应用的规则
# 文档: https://github.com/asmvik/yabai/blob/master/doc/yabai.asciidoc#rule

# 应用规则
apply_app_rules() {
    echo "正在配置应用程序规则..."

    # 示例:
    # yabai -m rule --add app="^AppName$" manage=off
    # yabai -m rule --add app="^AppName$" space=2
    # yabai -m rule --add app="^AppName$" sticky=on

    echo "应用程序规则配置完成"
}

# 清除所有应用规则
clear_app_rules() {
    echo "正在清除应用程序规则..."
    # 按需添加清除逻辑
    echo "应用程序规则已清除"
}

# 重新加载应用规则
reload_app_rules() {
    clear_app_rules
    apply_app_rules
}
