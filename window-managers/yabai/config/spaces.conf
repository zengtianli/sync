# 应用空间规则
apply_space_rules() {
    local space_number=$1
    local apps_array_name="SPACE${space_number}_APPS[@]"
    local apps=("${!apps_array_name}")
    
    echo "正在配置空间 ${space_number} 的应用规则..."
    
    for app in "${apps[@]}"; do
        if [ -n "$app" ]; then
            yabai -m rule --add label="space${space_number}_${app}" app="^${app}.*$" space=^${space_number}
            echo "已添加规则: ${app} -> 空间 ${space_number}"
        fi
    done
}

# 应用所有空间规则
apply_all_space_rules() {
    echo "正在应用所有空间规则..."
    
    # 应用每个空间的规则
    for i in {1..9}; do
        apply_space_rules $i
    done
    
    echo "所有空间规则已应用完成"
}

# 清除所有空间规则
clear_space_rules() {
    echo "正在清除所有空间规则..."
    yabai -m rule --remove "space[1-9]_.*"
    echo "空间规则已清除"
}

# 重新加载空间规则
reload_space_rules() {
    clear_space_rules
    apply_all_space_rules
}
